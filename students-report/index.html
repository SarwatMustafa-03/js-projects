<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Student Result System</title>
</head>

<body>
    <div class="container">
        <h1>Student Result System</h1>

        <div class="input-section">
            <input type="number" id="sub1" placeholder="Subject 1 Marks">
            <input type="number" id="sub2" placeholder="Subject 2 Marks">
            <input type="number" id="sub3" placeholder="Subject 3 Marks">
            <input type="number" id="sub4" placeholder="Subject 4 Marks">
            <input type="number" id="sub5" placeholder="Subject 5 Marks">

            <button onclick="calculateResult()">Calculate Result</button>
        </div>

        <div class="result-section">
            <p>Total: <span id="total"></span></p>
            <p>Percentage: <span id="percentage"></span></p>
            <p>Grade: <span id="grade"></span></p>
        </div>
    </div>

<script src="app.js"></script>
</body>

</html>
